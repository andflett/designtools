<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cascade — CSS Layout Icons</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- No index — internal reference page -->
    <meta name="robots" content="noindex, nofollow" />

    <!-- Theme (prevent flash) -->
    <script>
      (function(){var t=localStorage.getItem('theme');
      if(t==='dark'||((!t)&&matchMedia('(prefers-color-scheme:dark)').matches))
      document.documentElement.classList.add('dark')})()
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;500&family=Jersey+25&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/cascade.tsx"></script>
  </body>
</html>
