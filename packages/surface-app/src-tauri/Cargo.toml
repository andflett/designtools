[package]
name = "surface-app"
version = "0.1.0"
edition = "2021"

[lib]
name = "surface_app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "surface-app"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon", "image-png"] }
tauri-plugin-process = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", features = ["json"] }
keyring = { version = "3", features = ["apple-native", "windows-native", "linux-secret-service"] }
dirs = "5"
